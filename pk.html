<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Pakrea (powered by Google)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      --bg: #0f172a;
      --card: #020617;
      --accent: #22c55e;
      --accent-soft: rgba(34, 197, 94, 0.15);
      --text: #e5e7eb;
      --muted: #9ca3af;
    }

    * {
      box-sizing: border-box;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at top, #1e293b 0, #020617 55%, #000 100%);
      color: var(--text);
    }

    .wrapper {
      width: 100%;
      max-width: 720px;
      padding: 24px;
    }

    .card {
      background: linear-gradient(145deg, rgba(15,23,42,0.96), rgba(15,23,42,0.9));
      border-radius: 20px;
      padding: 28px 24px 22px;
      box-shadow:
        0 24px 60px rgba(0,0,0,0.7),
        0 0 0 1px rgba(148,163,184,0.12);
      backdrop-filter: blur(18px);
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 22px;
      gap: 12px;
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .brand-title {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      background: linear-gradient(120deg, #22c55e, #a3e635);
      -webkit-background-clip: text;
      color: transparent;
    }

    .brand-sub {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--muted);
    }

    .powered {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: var(--muted);
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid rgba(148,163,184,0.35);
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: radial-gradient(circle at top left, rgba(148,163,184,0.18), transparent 55%);
    }

    .powered span {
      font-weight: 600;
      color: #facc15;
    }

    .search-area {
      margin-bottom: 18px;
    }

    .search-form {
      display: flex;
      align-items: center;
      gap: 10px;
      background: radial-gradient(circle at top left, rgba(34,197,94,0.16), transparent 55%);
      padding: 10px 10px 10px 14px;
      border-radius: 999px;
      border: 1px solid rgba(148,163,184,0.4);
      box-shadow:
        0 0 0 1px rgba(15,23,42,0.9),
        0 18px 40px rgba(15,23,42,0.9);
    }

    .search-input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      color: var(--text);
      font-size: 15px;
    }

    .search-input::placeholder {
      color: rgba(148,163,184,0.9);
    }

    .search-button {
      border: none;
      outline: none;
      cursor: pointer;
      padding: 8px 18px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #022c22;
      background: linear-gradient(135deg, #22c55e, #a3e635);
      box-shadow:
        0 10px 25px rgba(34,197,94,0.45),
        0 0 0 1px rgba(21,128,61,0.4);
      transition: transform 0.08s ease-out, box-shadow 0.08s ease-out, filter 0.08s ease-out;
      white-space: nowrap;
    }

    .search-button:hover {
      transform: translateY(-1px);
      filter: brightness(1.05);
      box-shadow:
        0 14px 30px rgba(34,197,94,0.55),
        0 0 0 1px rgba(21,128,61,0.6);
    }

    .search-button:active {
      transform: translateY(0);
      box-shadow:
        0 6px 16px rgba(34,197,94,0.4),
        0 0 0 1px rgba(21,128,61,0.7);
    }

    .search-icon {
      width: 18px;
      height: 18px;
      border-radius: 999px;
      border: 1px solid rgba(148,163,184,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 4px;
      color: rgba(148,163,184,0.9);
      font-size: 11px;
    }

    .quick-links {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 10px;
      margin-top: 6px;
    }

    .quick-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .quick-link {
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding: 10px 11px;
      border-radius: 12px;
      text-decoration: none;
      background: radial-gradient(circle at top left, rgba(15,23,42,0.9), rgba(15,23,42,0.96));
      border: 1px solid rgba(51,65,85,0.9);
      color: var(--text);
      font-size: 13px;
      box-shadow:
        0 10px 24px rgba(15,23,42,0.9),
        0 0 0 1px rgba(15,23,42,0.9);
      transition: transform 0.08s ease-out, box-shadow 0.08s ease-out, border-color 0.08s ease-out, background 0.08s ease-out;
    }

    .quick-link:hover {
      transform: translateY(-1px);
      border-color: rgba(34,197,94,0.7);
      background: radial-gradient(circle at top left, rgba(34,197,94,0.18), rgba(15,23,42,0.98));
      box-shadow:
        0 16px 32px rgba(15,23,42,0.95),
        0 0 0 1px rgba(22,163,74,0.7);
    }

    .quick-link:active {
      transform: translateY(0);
      box-shadow:
        0 8px 18px rgba(15,23,42,0.9),
        0 0 0 1px rgba(22,163,74,0.8);
    }

    .quick-main {
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .quick-sub {
      font-size: 11px;
      color: var(--muted);
    }

    .footer {
      margin-top: 14px;
      font-size: 11px;
      color: rgba(148,163,184,0.8);
      display: flex;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
    }

    .footer span {
      opacity: 0.9;
    }

    @media (max-width: 520px) {
      .card {
        padding: 22px 18px 18px;
      }

      .brand-title {
        font-size: 22px;
      }

      .search-form {
        padding: 8px 8px 8px 12px;
      }

      .search-button {
        padding: 7px 14px;
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="card">
      <header class="header">
        <div class="brand">
          <div class="brand-title">Pakrea</div>
          <div class="brand-sub">Start page</div>
        </div>
        <div class="powered">
          powered by <span>Google</span>
        </div>
      </header>

      <!-- Barra di ricerca -->
      <section class="search-area">
        <form class="search-form" action="https://www.google.com/search" method="GET">
          <div class="search-icon">⌕</div>
          <input
            class="search-input"
            type="text"
            name="q"
            placeholder="Cerca sul Web con Google…"
            autocomplete="off"
            autofocus
          >
          <button class="search-button" type="submit">Cerca</button>
        </form>
      </section>

      <!-- Collegamenti rapidi -->
      <section>
        <div class="quick-title">Collegamenti rapidi</div>
        <div class="quick-links">
          <!-- Modifica gli href con le pagine che vuoi aprire -->
          <a class="quick-link" href="https://www.google.com" target="_blank" rel="noopener">
            <span class="quick-main">Google</span>
            <span class="quick-sub">Ricerca classica</span>
          </a>

          <a class="quick-link" href="https://mail.google.com" target="_blank" rel="noopener">
            <span class="quick-main">Gmail</span>
            <span class="quick-sub">Posta in arrivo</span>
          </a>

          <a class="quick-link" href="https://drive.google.com" target="_blank" rel="noopener">
            <span class="quick-main">Drive</span>
            <span class="quick-sub">File e documenti</span>
          </a>

          <a class="quick-link" href="https://www.youtube.com" target="_blank" rel="noopener">
            <span class="quick-main">YouTube</span>
            <span class="quick-sub">Video e musica</span>
          </a>

          <!-- Esempi personalizzati -->
          <a class="quick-link" href="https://github.com/DeMENIGECO" target="_blank" rel="noopener">
            <span class="quick-main">Autore di questo e altre repo</span>
            <span class="quick-sub">DeMENIGECO</span>
          </a>

        </div>
      </section>

      <footer class="footer">
        <span>Pakrea · pagina iniziale personale</span>
        <span>Le ricerche sono effettuate tramite Google Search.</span>
      </footer>
    </div>
  </div>
</body>
</html>
